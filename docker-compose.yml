services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kalshi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kalshi_bot
      POSTGRES_PASSWORD: kalshi_bot
      POSTGRES_DB: kalshi_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalshi_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ── Python backend + bot scheduler ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kalshi_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://kalshi_bot:kalshi_bot@postgres:5432/kalshi_bot
    ports:
      - "8000:8000"
    volumes:
      # Mount config so you can tweak it without rebuilding
      # Not read-only — executor writes back when auto-reverting to paper
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ── React UI ───────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: kalshi_ui
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
